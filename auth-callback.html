<!DOCTYPE html>
<html class="dark" lang="no">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { "primary": "#ff6b00", "bg": "#050505", "surface": "#111111", "border": "#1e1e1e" },
        fontFamily: { "sans": ["DM Sans", "sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family: 'DM Sans', sans-serif; }
  .ms { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; line-height: 1; display: inline-block; white-space: nowrap; direction: ltr; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@sentry/browser@8/build/bundles/bundle.tracing.replay.min.js" crossorigin="anonymous"></script>
<script src="sentry-config.js"></script>
<title>FlyDeals — Logger inn...</title>
</head>
<body class="bg-[#050505] text-slate-100 min-h-screen flex flex-col items-center justify-center">
  <div class="flex flex-col items-center gap-4">
    <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/25">
      <span class="ms" style="font-size:30px">flight_takeoff</span>
    </div>
    <h1 class="text-xl font-bold text-white">Logger inn...</h1>
    <p class="text-slate-400 text-sm" id="statusMsg">Vennligst vent mens vi setter opp kontoen din.</p>
    <div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin mt-2"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
async function handleCallback() {
  const statusMsg = document.getElementById('statusMsg');

  if (!supabase) {
    statusMsg.textContent = 'Feil: Kunne ikke koble til serveren.';
    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    return;
  }

  // Supabase SDK automatically reads the #access_token hash fragment
  // We need to wait for the auth state change to complete
  let resolved = false;

  // Listen for auth state change (triggered when SDK processes the hash)
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (resolved) return;

    if (event === 'SIGNED_IN' && session?.user) {
      resolved = true;
      statusMsg.textContent = 'Setter opp profilen din...';
      const profile = await ensureUserProfile(session.user);
      window.location.href = 'deals.html';
    }
  });

  // Fallback: if onAuthStateChange doesn't fire within 3 seconds, try getUser directly
  setTimeout(async () => {
    if (resolved) return;
    const user = await getUser();
    if (user) {
      resolved = true;
      statusMsg.textContent = 'Setter opp profilen din...';
      await ensureUserProfile(user);
      window.location.href = 'deals.html';
    } else {
      statusMsg.textContent = 'Innlogging feilet. Prøv igjen...';
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    }
  }, 3000);
}

handleCallback();
</script>
</body>
</html>
