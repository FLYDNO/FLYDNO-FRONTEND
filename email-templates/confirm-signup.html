<!-- FlyDeals — Bekreft registrering e-postmal -->
<!-- Lim inn i Supabase Dashboard → Authentication → Email Templates → Confirm signup -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#050505;padding:40px 20px;font-family:'Helvetica Neue',Arial,sans-serif;">
  <tr><td align="center">
    <table width="480" cellpadding="0" cellspacing="0" style="background:#111111;border:1px solid #1e1e1e;border-radius:16px;overflow:hidden;">
      <!-- Header -->
      <tr><td style="padding:32px 32px 24px;text-align:center;">
        <div style="width:48px;height:48px;background:#ff6b00;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
          <img src="https://flydno-frontend.vercel.app/assets/logos/flydeals-icon-64px.png" width="32" height="32" alt="FlyDeals" style="border-radius:6px;" />
        </div>
        <h1 style="margin:0;font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">FlyDeals</h1>
      </td></tr>
      <!-- Body -->
      <tr><td style="padding:0 32px 32px;">
        <h2 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#ffffff;">Bekreft e-postadressen din</h2>
        <p style="margin:0 0 24px;font-size:14px;color:rgba(255,255,255,0.6);line-height:1.6;">
          Velkommen til FlyDeals! Klikk på knappen under for å bekrefte e-postadressen din og aktivere kontoen.
        </p>
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;background:#ff6b00;color:#ffffff;font-size:14px;font-weight:700;text-decoration:none;border-radius:100px;">
          Bekreft e-post
        </a>
        <p style="margin:24px 0 0;font-size:12px;color:rgba(255,255,255,0.35);line-height:1.6;">
          Hvis du ikke opprettet en konto hos FlyDeals, kan du trygt ignorere denne e-posten.
        </p>
      </td></tr>
      <!-- Footer -->
      <tr><td style="padding:20px 32px;border-top:1px solid #1e1e1e;text-align:center;">
        <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.25);">
          © 2026 FlyDeals — Billige flyreiser. Funnet for deg.
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
